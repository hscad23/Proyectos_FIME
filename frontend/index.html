<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Experimental - P3 style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Capa 3D Absoluta Trasera -->
    <div id="canvas-container"></div>
    <!-- Tooltip Interactivo Canvas -->
    <div id="tooltip" class="hidden"></div>
    
    <!-- Título Principal Superior -->
    <header class="p3-header">
        <h1>SIMULADOR DE CAMPOS MAGNÉTICOS</h1>
        <div class="decorative-line"></div>
    </header>

    <!-- Ventana Teórica (Faraday/Lenz) -->
    <div class="panel-teorico">
        <h3>Teoría: Faraday-Lenz</h3>
        <p class="formula-math">&epsilon; = -N &middot; <span class="delta">&Delta;&Phi;</span> / <span class="delta">&Delta;t</span></p>
        <p class="formula-desc">FEM Inducida se opone a la variación de flujo magnético en el tiempo.</p>
    </div>

    <!-- Superposición HUD Arriba Derecha-->
    <div id="hud-multimetro" class="hud-top-right">
        <div class="hud-header">ADQUISICIÓN DE DATOS (DAQ)</div>
        <div class="hud-screen">
            <div class="hud-value" id="hud-voltaje">0.00 V</div>
            <div class="hud-grafica-container">
                <canvas id="osciloscopio" width="400" height="150"></canvas>
            </div>
            <div class="hud-estado" id="hud-estado">ESTABILIZADO</div>
            <!-- Log de 5 registros -->
            <ul id="log-registros" class="log-list">
                <!-- Se llenará dinámicamente -->
            </ul>
        </div>
    </div>

    <!-- Panel Inferior DASHBOARD CON SLIDERS -->
    <div class="p3-dashboard">
        <div class="dashboard-controls">
            <!-- Grupo 1: Controles de Imán -->
            <div class="control-column">
                <div class="input-slider">
                    <label>Fuerza Magneto (T)</label>
                    <input type="range" id="campo_fuerza" min="0.1" max="5" step="0.1" value="0.8">
                    <span id="valor-fuerza">0.8</span>
                </div>
                <div class="input-slider">
                    <label>Resistencia (&Omega;)</label>
                    <input type="range" id="resistencia" min="1" max="50" step="1" value="5">
                    <span id="valor-resistencia">5</span>
                </div>
                <!-- Para el backend "campo_final" u origen delta lo derivamos -->
            </div>
            
            <!-- Grupo 2: Controles de Bobina -->
            <div class="control-column">
                <div class="input-slider">
                    <label>Espiras (N)</label>
                    <input type="range" id="espiras" min="10" max="250" step="1" value="100">
                    <span id="valor-espiras">100</span>
                </div>
                <div class="input-slider">
                    <label>Área Int (m²)</label>
                    <input type="range" id="area" min="0.1" max="2" step="0.1" value="0.5">
                    <span id="valor-area">0.5</span>
                </div>
            </div>

            <!-- Grupo 3: Controles Cinemáticos -->
            <div class="control-column">
                <div class="input-slider">
                    <label>Velocidad M. (s)</label>
                    <input type="range" id="tiempo" min="0.1" max="3" step="0.1" value="1.0">
                    <span id="valor-tiempo">1.0</span>
                </div>
                <!-- Toggle Automático -->
                <div class="toggle-container">
                    <label>Auto-Loop (Frecuencia)</label>
                    <label class="switch">
                        <input type="checkbox" id="auto-reproducir">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
            
            <div class="control-actions">
                <button id="btn-calculadora" class="p3-button action-btn">Lanzar Simulación</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="app.js"></script>
    <script src="main3d.js"></script>
</body>
</html>
